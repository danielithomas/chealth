name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest

      - name: Run chealth on itself
        run: uv run chealth .
        # Exit code reflects worst severity across all discovered files,
        # including test fixtures that intentionally contain DANGER cases.
        # The pytest suite validates correctness; this step just verifies the
        # CLI runs without crashing.
        continue-on-error: true
